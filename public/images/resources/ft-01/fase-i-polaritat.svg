<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Fase i polaritat</title>
  <desc id="desc">Tres formes d'ona que mostren fase alineada, desplacament temporal i inversio de polaritat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101724"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#ffffff" stroke-width="1">
    <path d="M80 150H1120M80 310H1120M80 470H1120"/>
    <path d="M160 80V540M280 80V540M400 80V540M520 80V540M640 80V540M760 80V540M880 80V540M1000 80V540"/>
  </g>
  <text x="82" y="78" fill="#f1c99a" font-family="Arial, sans-serif" font-size="26" font-weight="800">Fase: quan dues ones arriben juntes o desplacades</text>
  <text x="82" y="112" fill="#b9b0a8" font-family="Arial, sans-serif" font-size="18">La mateixa frequencia pot sumar, canviar el timbre o cancel-lar parcialment segons el desplacament.</text>
  <path d="M100 150C160 75 220 75 280 150S400 225 460 150S580 75 640 150S760 225 820 150S940 75 1000 150S1120 225 1180 150" fill="none" stroke="#d08a3f" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M100 150C160 75 220 75 280 150S400 225 460 150S580 75 640 150S760 225 820 150S940 75 1000 150S1120 225 1180 150" fill="none" stroke="#f1c99a" stroke-width="3" stroke-linecap="round"/>
  <text x="82" y="244" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">0 graus: suma clara</text>
  <path d="M100 310C160 235 220 235 280 310S400 385 460 310S580 235 640 310S760 385 820 310S940 235 1000 310S1120 385 1180 310" fill="none" stroke="#d08a3f" stroke-width="7" stroke-linecap="round"/>
  <path d="M160 310C220 235 280 235 340 310S460 385 520 310S640 235 700 310S820 385 880 310S1000 235 1060 310" fill="none" stroke="#6aa2ff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <text x="82" y="404" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">Desplacada: canvia el timbre</text>
  <path d="M100 470C160 395 220 395 280 470S400 545 460 470S580 395 640 470S760 545 820 470S940 395 1000 470S1120 545 1180 470" fill="none" stroke="#d08a3f" stroke-width="7" stroke-linecap="round"/>
  <path d="M100 470C160 545 220 545 280 470S400 395 460 470S580 545 640 470S760 395 820 470S940 545 1000 470S1120 395 1180 470" fill="none" stroke="#f06aa8" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
  <text x="82" y="564" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">Polaritat invertida: pot cancel-lar</text>
</svg>
